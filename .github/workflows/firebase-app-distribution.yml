name: Flutter CI/CD & Firebase App Distribution

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout codebase
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java Development Kit (required for Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter Environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Resolve package dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Run static analysis
      - name: Analyze project structure
        run: flutter analyze

      # 6. Run unit and widget tests
      - name: Run unit tests
        run: flutter test

      # 7. Build release APK for Android
      - name: Build Release APK
        run: flutter build apk --release

      # 8. Install Firebase CLI Tools
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 9. Upload to Firebase App Distribution
      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --groups "testers" \
            --release-notes "Build triggered by GitHub Actions. Commit: ${{ github.sha }}"